name: Install

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  npm-install:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm ls --depth=0
